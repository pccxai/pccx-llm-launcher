name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shell:
    name: shell-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: shellcheck on scripts/
        run: |
          # Lint actual runnable scripts (.sh) but not frozen .snapshot files,
          # which are kept as historical reference and may not pass current rules.
          mapfile -t files < <(find scripts -type f -name '*.sh' -not -name '*.snapshot' 2>/dev/null)
          if [ ${#files[@]} -eq 0 ]; then
            echo "no .sh scripts to lint"
          else
            shellcheck "${files[@]}"
          fi

  claim-scan:
    name: claim-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: forbidden-claim grep
        run: |
          # Block accidental overclaims in user-facing surfaces.
          # Scope: README + docs/ + scripts/.
          # Exclusions: scripts/legacy/* (frozen historical material) and
          # this workflow file itself (which contains the patterns by design).
          set -e
          python3 - <<'PY'
          import os, re, sys
          PATTERN = re.compile(
              r"(?:\bis\s+|\bnow\s+|\balready\s+|\bcurrently\s+)?"
              r"(production[- ]ready|marketplace[- ]ready|"
              r"(?<!pre-)stable\s+(?:api|abi|lsp)|"
              r"mcp\s+ready|ai\s+provider\s+ready|"
              r"kv260 inference (?:works|works now|is working|is functional)|"
              r"20\s*tok/s\s+achieved|timing[- ]closed|fully verified|"
              r"vibe coding|autonomous coding|"
              r"(?:claude|gpt)\s+directly\s+controls)",
              re.IGNORECASE,
          )
          # A line is only flagged if the matched phrase is *asserted*.
          # Lines that explicitly negate the claim ("no production-ready",
          # "not described as", "is not", etc.) are allowed.
          NEGATION = re.compile(
              r"\b(?:no|not|never|avoid|without|forbidden|skip|do not"
              r"|does not|is not|are not)\b",
              re.IGNORECASE,
          )
          SCAN_EXTS = {".md", ".sh", ".yml", ".yaml", ".json"}
          SKIP_DIRS = {".git", "scripts/legacy"}
          SKIP_FILES = {".github/workflows/ci.yml"}
          violations = []
          for root, dirs, files in os.walk("."):
              dirs[:] = [
                  d for d in dirs
                  if os.path.relpath(os.path.join(root, d), ".") not in SKIP_DIRS
              ]
              for name in files:
                  rel = os.path.relpath(os.path.join(root, name), ".")
                  if rel in SKIP_FILES:
                      continue
                  if not any(rel.endswith(ext) for ext in SCAN_EXTS):
                      continue
                  if "scripts/legacy/" in rel:
                      continue
                  with open(rel, encoding="utf-8", errors="replace") as fh:
                      lines = fh.read().splitlines()
                      for index, line in enumerate(lines):
                          context = " ".join(
                              lines[i]
                              for i in range(max(0, index - 2), min(len(lines), index + 2))
                          )
                          if PATTERN.search(line) and not NEGATION.search(context):
                              violations.append(f"{rel}:{index + 1}: {line}")
          if violations:
              print("Forbidden positive claims detected:")
              for v in violations:
                  print(v)
              print(
                  "::error::Rephrase as target / planned / pending verification.",
              )
              sys.exit(1)
          print("claim-scan clean")
          PY

  check-script:
    name: check-script-runs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: chmod scripts
        run: |
          for f in scripts/check.sh \
                   scripts/check-device-stub.sh \
                   scripts/install-stub.sh \
                   scripts/launch-stub.sh \
                   scripts/status-stub.sh \
                   scripts/device-session-status-stub.sh \
                   scripts/runtime-readiness-stub.sh \
                   scripts/chat-model-status-stub.sh \
                   scripts/chat-session-stub.sh \
                   scripts/chat-session-lifecycle-stub.sh \
                   scripts/chat-readiness-stub.sh \
                   scripts/chat-composer-stub.sh \
                   scripts/chat-send-result-stub.sh \
                   scripts/chat-surface-preview.sh \
                   scripts/chat-stub.sh; do
            [ -f "$f" ] && chmod +x "$f" || true
          done
      - name: run scripts/check.sh
        run: ./scripts/check.sh
      - name: run scripts/check-device-stub.sh
        run: |
          if [ -x scripts/check-device-stub.sh ]; then
            ./scripts/check-device-stub.sh
          else
            echo "scripts/check-device-stub.sh not present; skipping"
          fi
      - name: run scripts/install-stub.sh (preview only)
        run: |
          if [ -x scripts/install-stub.sh ]; then
            ./scripts/install-stub.sh
          else
            echo "scripts/install-stub.sh not present; skipping"
          fi
      - name: run scripts/launch-stub.sh (dry-run)
        run: ./scripts/launch-stub.sh --dry-run
      - name: launch-stub refuses without --dry-run
        run: |
          set -e
          if ./scripts/launch-stub.sh; then
            echo "::error::expected non-zero exit without --dry-run"
            exit 1
          fi
          echo "launch-stub correctly refused without --dry-run"
      - name: run scripts/status-stub.sh
        run: ./scripts/status-stub.sh
      - name: run scripts/status-stub.sh with device/session status
        run: ./scripts/status-stub.sh --include-device-session
      - name: run scripts/device-session-status-stub.sh
        run: ./scripts/device-session-status-stub.sh --model gemma3n-e4b --target kv260
      - name: run scripts/status-stub.sh with runtime readiness
        run: ./scripts/status-stub.sh --include-runtime-readiness
      - name: run scripts/runtime-readiness-stub.sh
        run: ./scripts/runtime-readiness-stub.sh --model gemma3n-e4b --target kv260
      - name: run scripts/status-stub.sh with chat model status
        run: ./scripts/status-stub.sh --include-chat-model-status
      - name: run scripts/chat-model-status-stub.sh
        run: ./scripts/chat-model-status-stub.sh --model gemma3n-e4b --target kv260
      - name: run scripts/chat-session-stub.sh
        run: ./scripts/chat-session-stub.sh --model gemma3n-e4b --target kv260
      - name: run scripts/chat-session-lifecycle-stub.sh
        run: ./scripts/chat-session-lifecycle-stub.sh --model gemma3n-e4b --target kv260
      - name: run scripts/status-stub.sh with chat readiness
        run: ./scripts/status-stub.sh --include-chat-readiness
      - name: run scripts/chat-readiness-stub.sh
        run: ./scripts/chat-readiness-stub.sh --model gemma3n-e4b --target kv260
      - name: run scripts/status-stub.sh with chat composer
        run: ./scripts/status-stub.sh --include-chat-composer
      - name: run scripts/chat-composer-stub.sh
        run: ./scripts/chat-composer-stub.sh --model gemma3n-e4b --target kv260
      - name: run scripts/status-stub.sh with chat send result
        run: ./scripts/status-stub.sh --include-chat-send-result
      - name: run scripts/chat-send-result-stub.sh
        run: ./scripts/chat-send-result-stub.sh --model gemma3n-e4b --target kv260
      - name: run scripts/chat-surface-preview.sh
        run: ./scripts/chat-surface-preview.sh --model gemma3n-e4b --target kv260
      - name: run scripts/chat-stub.sh --dry-run
        run: ./scripts/chat-stub.sh --dry-run --prompt "hello"
      - name: chat-stub refuses without --dry-run
        run: |
          set -e
          if ./scripts/chat-stub.sh --prompt "hello"; then
            echo "::error::expected non-zero exit without --dry-run"
            exit 1
          fi
          echo "chat-stub correctly refused without --dry-run"
      - name: run launcher/IDE contract tests
        run: python3 scripts/tests/launcher_ide_contract_test.py
      - name: run model/runtime descriptor tests
        run: python3 scripts/tests/model_runtime_descriptor_test.py
      - name: run diagnostics handoff contract tests
        run: python3 scripts/tests/diagnostics_handoff_contract_test.py
      - name: run device/session status contract tests
        run: python3 scripts/tests/device_session_status_contract_test.py
      - name: run runtime readiness contract tests
        run: python3 scripts/tests/runtime_readiness_contract_test.py
      - name: run chat/session contract tests
        run: python3 scripts/tests/chat_session_contract_test.py
      - name: run chat model status contract tests
        run: python3 scripts/tests/chat_model_status_contract_test.py
      - name: run chat/session lifecycle contract tests
        run: python3 scripts/tests/chat_session_lifecycle_contract_test.py
      - name: run chat readiness contract tests
        run: python3 scripts/tests/chat_readiness_contract_test.py
      - name: run chat composer contract tests
        run: python3 scripts/tests/chat_composer_contract_test.py
      - name: run chat send-result contract tests
        run: python3 scripts/tests/chat_send_result_contract_test.py
      - name: run chat surface preview tests
        run: python3 scripts/tests/chat_surface_preview_test.py

  status-backend:
    name: status-backend-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: chmod scripts
        run: |
          chmod +x scripts/status-stub.sh
          chmod +x scripts/chat-stub.sh
          chmod +x scripts/chat-model-status-stub.sh
          chmod +x scripts/chat-session-stub.sh
          chmod +x scripts/chat-session-lifecycle-stub.sh
          chmod +x scripts/chat-readiness-stub.sh
          chmod +x scripts/chat-composer-stub.sh
          chmod +x scripts/chat-send-result-stub.sh
          chmod +x scripts/launch-stub.sh
          chmod +x scripts/tests/status-backend.sh
          chmod +x scripts/tests/status-device-session.sh
          chmod +x scripts/tests/status-readiness.sh
          chmod +x scripts/tests/status-chat-model-status.sh
          chmod +x scripts/tests/status-chat-session.sh
          chmod +x scripts/tests/status-chat-readiness.sh
          chmod +x scripts/tests/status-chat-composer.sh
          chmod +x scripts/tests/status-chat-send-result.sh
      - name: shellcheck status-stub and test script
        run: |
          sudo apt-get update -q && sudo apt-get install -y -q shellcheck
          shellcheck scripts/status-stub.sh
          shellcheck scripts/tests/status-backend.sh
          shellcheck scripts/tests/status-device-session.sh
          shellcheck scripts/tests/status-readiness.sh
          shellcheck scripts/tests/status-chat-model-status.sh
          shellcheck scripts/tests/status-chat-session.sh
          shellcheck scripts/tests/status-chat-readiness.sh
          shellcheck scripts/tests/status-chat-composer.sh
          shellcheck scripts/tests/status-chat-send-result.sh
      - name: run status-backend tests
        run: bash scripts/tests/status-backend.sh scripts/status-stub.sh
      - name: run status-device-session tests
        run: bash scripts/tests/status-device-session.sh scripts/status-stub.sh
      - name: run status-readiness tests
        run: bash scripts/tests/status-readiness.sh scripts/status-stub.sh
      - name: run status-chat-model-status tests
        run: bash scripts/tests/status-chat-model-status.sh scripts/status-stub.sh
      - name: run status-chat-session tests
        run: bash scripts/tests/status-chat-session.sh scripts/status-stub.sh
      - name: run status-chat-readiness tests
        run: bash scripts/tests/status-chat-readiness.sh scripts/status-stub.sh
      - name: run status-chat-composer tests
        run: bash scripts/tests/status-chat-composer.sh scripts/status-stub.sh
      - name: run status-chat-send-result tests
        run: bash scripts/tests/status-chat-send-result.sh scripts/status-stub.sh
